name: ci-failure-webhook

on:
  workflow_run:
    workflows:
      - ci
      - security
      - codeql
      - dependency-graph
      - renovate-nix-hash
    types:
      - completed

permissions:
  contents: read

concurrency:
  group: ci-failure-webhook-${{ github.event.workflow_run.id }}
  cancel-in-progress: false

jobs:
  notify:
    name: notify Vasyl
    if: >-
      ${{
        github.event.workflow_run.conclusion != 'success' &&
        github.event.workflow_run.conclusion != 'skipped'
      }}
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Send signed workflow_run payload to Hermes
        env:
          HERMES_CI_WEBHOOK_URL: ${{ secrets.HERMES_CI_WEBHOOK_URL }}
          HERMES_CI_WEBHOOK_SECRET: ${{ secrets.HERMES_CI_WEBHOOK_SECRET }}
        run: |
          python3 - <<'PY'
          import hashlib
          import hmac
          import json
          import os
          import sys
          import urllib.error
          import urllib.request

          url = os.environ.get("HERMES_CI_WEBHOOK_URL", "")
          secret = os.environ.get("HERMES_CI_WEBHOOK_SECRET", "")
          if not url or not secret:
              print("::warning::Hermes CI webhook secrets are not configured; skipping notification")
              sys.exit(0)

          with open(os.environ["GITHUB_EVENT_PATH"], "rb") as handle:
              body = handle.read()

          signature = "sha256=" + hmac.new(
              secret.encode("utf-8"), body, hashlib.sha256
          ).hexdigest()

          request = urllib.request.Request(
              url,
              data=body,
              method="POST",
              headers={
                  "Content-Type": "application/json",
                  "X-GitHub-Event": "workflow_run",
                  "X-GitHub-Delivery": os.environ.get("GITHUB_RUN_ID", "workflow-run"),
                  "X-Hub-Signature-256": signature,
                  "User-Agent": "0x77dev-land-ci-failure-webhook",
              },
          )
          try:
              with urllib.request.urlopen(request, timeout=20) as response:
                  print(response.read().decode("utf-8")[:1000])
          except urllib.error.HTTPError as error:
              print(error.read().decode("utf-8", "replace")[:1000])
              raise
          PY
