name: dependency-graph

on:
  push:
    branches:
      - main
    paths:
      - flake.lock
      - scripts/github-dependency-snapshot.py
      - .github/workflows/dependency-graph.yml
  schedule:
    - cron: "17 8 * * 2"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: dependency-graph-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  submit-nix-flake:
    name: submit flake.lock
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          persist-credentials: false

      - name: Generate dependency snapshot
        run: python3 scripts/github-dependency-snapshot.py > dependency-snapshot.json

      - name: Submit dependency snapshot
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python3 - <<'PY'
          import json
          import os
          import urllib.request

          repository = os.environ["GITHUB_REPOSITORY"]
          token = os.environ["GITHUB_TOKEN"]
          with open("dependency-snapshot.json", "rb") as handle:
              body = handle.read()
          request = urllib.request.Request(
              f"https://api.github.com/repos/{repository}/dependency-graph/snapshots",
              data=body,
              method="POST",
              headers={
                  "Accept": "application/vnd.github+json",
                  "Authorization": f"Bearer {token}",
                  "Content-Type": "application/json",
                  "X-GitHub-Api-Version": "2022-11-28",
              },
          )
          with urllib.request.urlopen(request, timeout=20) as response:
              payload = json.loads(response.read())
          print(json.dumps(payload, indent=2))
          PY
