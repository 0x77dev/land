name: security

on:
  schedule:
    - cron: "0 6 * * 1"
  pull_request:
    paths:
      - flake.nix
      - flake.lock
      - renovate.json5
      - .github/workflows/**
      - scripts/nix-vulnerability-scan.sh
      - scripts/summarize-vulnerability-report.py
  merge_group:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: security-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  prepare:
    name: prepare
    runs-on: ubuntu-latest
    outputs:
      security-matrix: ${{ steps.targets.outputs.security-matrix }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd
        with:
          persist-credentials: false

      - name: Install Nix
        uses: cachix/install-nix-action@8aa03977d8d733052d78f4e008a241fd1dbf36b3
        with:
          extra_nix_config: |
            accept-flake-config = true
            experimental-features = nix-command flakes recursive-nix

      - name: Export flake-driven security targets
        id: targets
        run: |
          {
            echo 'security-matrix<<EOF'
            nix eval --json .#lib.automation.githubActions.security.matrix
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

  scorecard:
    name: scorecard
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd
        with:
          persist-credentials: false

      - name: Run OpenSSF Scorecard
        uses: ossf/scorecard-action@4eaacf0543bb3f2c246792bd56e8cdeffafb205a
        with:
          results_file: scorecard-results.sarif
          results_format: sarif
          publish_results: true

      - name: Upload Scorecard SARIF
        uses: github/codeql-action/upload-sarif@c10b8064de6f491fea524254123dbe5e09572f13
        with:
          sarif_file: scorecard-results.sarif

  nix-closures:
    name: nix closures / ${{ matrix.system }}
    needs: prepare
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch' || github.event_name == 'merge_group'
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJSON(needs.prepare.outputs.security-matrix) }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd
        with:
          persist-credentials: false

      - name: Free runner disk space
        run: |
          sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/lib/android /opt/hostedtoolcache/CodeQL
          sudo docker image prune -af || true
          df -h

      - name: Install Nix for space-constrained scanning
        uses: cachix/install-nix-action@8aa03977d8d733052d78f4e008a241fd1dbf36b3
        with:
          extra_nix_config: |
            accept-flake-config = true
            experimental-features = nix-command flakes recursive-nix
            max-jobs = 2
            cores = 2

      - name: Configure Cachix
        if: github.event_name == 'merge_group' || github.event_name == 'schedule' || github.event.pull_request.head.repo.full_name == github.repository
        uses: cachix/cachix-action@3ba601ff5bbb07c7220846facfa2cd81eeee15a1
        with:
          name: land
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}

      - name: Scan native closures one-by-one
        env:
          VULN_FAIL_ON: high
        run: nix shell nixpkgs#nix nixpkgs#sbomnix nixpkgs#vulnix nixpkgs#grype nixpkgs#osv-scanner -c bash scripts/nix-vulnerability-scan.sh ${{ join(matrix.scanTargets, ' ') }}

  osv-source:
    name: osv-scanner / source
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd
        with:
          persist-credentials: false

      - name: Install Nix
        uses: cachix/install-nix-action@8aa03977d8d733052d78f4e008a241fd1dbf36b3
        with:
          extra_nix_config: |
            accept-flake-config = true
            experimental-features = nix-command flakes

      - name: Generate OSV SARIF
        continue-on-error: true
        run: nix run nixpkgs#osv-scanner -- scan source -r --allow-no-lockfiles --format sarif --output osv-scanner.sarif .

      - name: Upload OSV SARIF
        if: ${{ always() && hashFiles('osv-scanner.sarif') != '' }}
        uses: github/codeql-action/upload-sarif@c10b8064de6f491fea524254123dbe5e09572f13
        with:
          sarif_file: osv-scanner.sarif

      - name: Enforce OSV findings
        run: nix run nixpkgs#osv-scanner -- scan source -r --allow-no-lockfiles .

  trivy:
    name: trivy / repository
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd
        with:
          persist-credentials: false

      - name: Install Nix
        uses: cachix/install-nix-action@8aa03977d8d733052d78f4e008a241fd1dbf36b3
        with:
          extra_nix_config: |
            accept-flake-config = true
            experimental-features = nix-command flakes

      - name: Generate Trivy SARIF
        run: >-
          nix run nixpkgs#trivy -- fs
          --scanners vuln,secret,misconfig
          --severity HIGH,CRITICAL
          --format sarif
          --output trivy-results.sarif
          .

      - name: Upload Trivy SARIF
        if: ${{ always() && hashFiles('trivy-results.sarif') != '' }}
        uses: github/codeql-action/upload-sarif@c10b8064de6f491fea524254123dbe5e09572f13
        with:
          sarif_file: trivy-results.sarif

      - name: Enforce Trivy findings
        run: >-
          nix run nixpkgs#trivy -- fs
          --scanners vuln,secret,misconfig
          --severity HIGH,CRITICAL
          --exit-code 1
          .
