[files]
extend-exclude = [
  # ASCII-armored key material, not prose.
  "gpg/keys/*.asc",
  "*.lock",
]

[default.extend-identifiers]
# Samba's smb.conf option is genuinely spelled this way.
browseable = "browseable"
# Helium's upstream reverse-domain profile identifier.
imput = "imput"

[default.extend-words]
# TeX Gyre Heros, the Helvetica-equivalent typeface.
Heros = "Heros"
# The MQTT broker (https://mosquitto.org), not the insect.
mosquitto = "mosquitto"
